<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Data API Explorer</title>

    <script src="https://apis.google.com/js/api.js"></script>
    <style>
    body {
    font-family: 'Roboto', sans-serif;
    background-color: #f0f2f5; /* Soft light background */
    color: #333;
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    box-sizing: border-box;
    }
    
    .container {
    background-color: #ffffff;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1); /* More pronounced shadow */
    padding: 35px 45px;
    width: 100%;
    max-width: 950px; /* Slightly wider */
    box-sizing: border-box;
    animation: fadeIn 0.8s ease-out;
    border-top: 5px solid #ff0000; /* YouTube red accent */
    }
    
    @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
    }
    
    h1 {
    color: #282828; /* Darker title */
    text-align: center;
    margin-bottom: 15px;
    font-size: 2.6em;
    font-weight: 700;
    letter-spacing: -0.5px;
    }
    
    h2 {
    color: #ff0000; /* YouTube Red */
    text-align: center;
    margin-top: 30px;
    margin-bottom: 25px;
    font-size: 2em;
    font-weight: 600;
    }
    
    p {
    text-align: center;
    color: #555;
    font-size: 1.1em;
    margin-bottom: 30px;
    }
    
    .input-section {
    display: flex;
    gap: 15px;
    margin-bottom: 40px;
    justify-content: center; /* Center the input and button */
    }
    
    .input-section input[type="text"] {
    flex-grow: 1;
    max-width: 600px;
    padding: 14px 20px;
    border: 1px solid #ddd;
    border-radius: 10px;
    font-size: 1.1em;
    outline: none;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }
    
    .input-section input[type="text"]:focus {
    border-color: #ff0000;
    box-shadow: 0 0 0 4px rgba(255, 0, 0, 0.2);
    }
    
    .input-section button {
    padding: 14px 30px;
    background-color: #ff0000; /* YouTube Red */
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 1.1em;
    font-weight: 600;
    transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
    }
    
    .input-section button:hover {
    background-color: #cc0000; /* Darker red on hover */
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(255, 0, 0, 0.3);
    }
    
    .input-section button:active {
    transform: translateY(0);
    box-shadow: none;
    }
    
    .data-display-section {
    margin-top: 30px;
    padding: 20px;
    background-color: #fefefe;
    border-radius: 10px;
    box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.05); /* Inner shadow */
    }
    
    .card-container {
    padding: 0;
    margin-bottom: 20px;
    }
    
    .data-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); /* Responsive grid */
    gap: 20px;
    }
    
    .data-list .data-item {
    background-color: #f9f9f9;
    border-radius: 8px;
    padding: 20px;
    border: 1px solid #eee;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    
    .data-list .data-item:hover {
    transform: translateY(-5px);
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }
    
    .data-list .data-item strong {
    color: #444;
    font-weight: 600;
    display: block; /* Make label a block for better spacing */
    margin-bottom: 5px;
    font-size: 0.95em;
    }
    
    .data-list .data-item span {
    color: #666;
    word-break: break-word; /* Ensure long links/text wrap */
    font-size: 1em;
    }
    
    .data-list .data-item a {
    color: #065fd4; /* YouTube blue link color */
    text-decoration: none;
    }
    
    .data-list .data-item a:hover {
    text-decoration: underline;
    }
    
    .data-list .thumbnail-item img {
    max-width: 100%;
    height: auto;
    border-radius: 6px;
    margin-top: 10px;
    border: 1px solid #ddd;
    }
    
    .error-message {
    background-color: #ffebee;
    color: #d32f2f;
    border: 1px solid #ef9a9a;
    border-radius: 8px;
    padding: 15px;
    text-align: center;
    margin-top: 30px;
    font-size: 1.1em;
    font-weight: 500;
    }
    
    /* Responsive adjustments */
    @media (max-width: 768px) {
    .container {
    padding: 20px;
    }
    h1 {
    font-size: 2em;
    }
    h2 {
    font-size: 1.6em;
    }
    .input-section {
    flex-direction: column;
    gap: 10px;
    }
    .input-section button {
    width: 100%;
    }
    .data-list {
    grid-template-columns: 1fr; /* Stack items on small screens */
    }
    }
    </style>
</head>
<body>
    <div class="container">
        <h1>YouTube Data API एक्सप्लोरर</h1>
        <p>अपनी YouTube API Key से सार्वजनिक चैनल और वीडियो डेटा प्राप्त करें।</p>

        <div class="input-section">
            <input type="text" id="youtube-input" placeholder="चैनल लिंक, वीडियो लिंक, चैनल ID या वीडियो ID दर्ज करें">
            <button id="fetch-youtube-data">डेटा प्राप्त करें</button>
        </div>

        <div id="data-display" class="data-display-section" style="display: none;">
            <h2>प्राप्त YouTube जानकारी</h2>
            <div class="card-container" id="youtube-data-card">
                <div class="data-list" id="youtube-data-list">
                    </div>
            </div>
        </div>

        <div id="error-message" class="error-message" style="display: none;">
            <p>कुछ त्रुटि हुई। कृपया पुनः प्रयास करें।</p>
        </div>
    </div>

<script>
// --- Configuration ---
const API_KEY = "AIzaSyDnvWg3pTPMdZhnGvqEgFYPsYe_GdKu2cs"; // आपकी YouTube Data API Key

// --- DOM Elements ---
const youtubeInput = document.getElementById('youtube-input');
const fetchYoutubeDataBtn = document.getElementById('fetch-youtube-data');
const dataDisplaySection = document.getElementById('data-display');
const youtubeDataList = document.getElementById('youtube-data-list');
const errorMessage = document.getElementById('error-message');

let gapiInited = false;

// --- Utility Functions ---

function showErrorMessage(message = 'कुछ त्रुटि हुई। कृपया पुनः प्रयास करें।') {
    errorMessage.textContent = message;
    errorMessage.style.display = 'block';
    dataDisplaySection.style.display = 'none'; // Hide data section on error
    setTimeout(() => {
        errorMessage.style.display = 'none';
    }, 7000); // Hide after 7 seconds
}

function clearErrorMessage() {
    errorMessage.style.display = 'none';
}

function displayDataItem(dataListElement, label, value) {
    if (value === undefined || value === null || value === '') {
        return; // Don't display empty values
    }
    const div = document.createElement('div');
    div.classList.add('data-item');
    div.innerHTML = `<strong>${label}:</strong> <span>${value}</span>`;
    dataListElement.appendChild(div);
}

function displayThumbnailItem(dataListElement, label, url) {
    if (!url) return;
    const div = document.createElement('div');
    div.classList.add('data-item', 'thumbnail-item');
    div.innerHTML = `<strong>${label}:</strong> <a href="${url}" target="_blank"><img src="${url}" alt="${label}"></a>`;
    dataListElement.appendChild(div);
}

// --- Google API Initialization ---

function gapiLoaded() {
    gapi.load('client', initializeGapiClient);
}

async function initializeGapiClient() {
    try {
        await gapi.client.init({
            apiKey: API_KEY,
            discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/youtube/v3/rest"],
        });
        gapiInited = true;
        console.log('GAPI client initialized for YouTube Data API.');
    } catch (error) {
        console.error('Error initializing GAPI client:', error);
        showErrorMessage('YouTube API क्लाइंट को आरंभ करने में त्रुटि हुई। कृपया अपनी API कुंजी जांचें।');
    }
}

// Automatically load GAPI when the window is loaded
window.onload = gapiLoaded;

// --- YouTube Data Fetch Logic ---

fetchYoutubeDataBtn.addEventListener('click', async () => {
    const input = youtubeInput.value.trim();
    if (!input) {
        showErrorMessage('कृपया एक YouTube चैनल लिंक, वीडियो लिंक, चैनल ID, या वीडियो ID दर्ज करें।');
        return;
    }

    if (!gapiInited) {
        showErrorMessage('YouTube API क्लाइंट अभी तक आरंभ नहीं हुआ है। कृपया कुछ देर प्रतीक्षा करें और पुनः प्रयास करें।');
        return;
    }

    clearErrorMessage();
    youtubeDataList.innerHTML = ''; // Clear previous results
    dataDisplaySection.style.display = 'block'; // Show data section

    let channelId = null;
    let videoId = null;

    // Regex to extract Channel ID from various URL patterns
    const channelIdRegex = /(?:youtube\.com\/(?:c\/|channel\/|user\/)|youtu\.be\/user\/)([a-zA-Z0-9_-]{24})/;
    const customUrlRegex = /youtube\.com\/c\/([a-zA-Z0-9_-]+)/;
    const legacyUserRegex = /youtube\.com\/user\/([a-zA-Z0-9_-]+)/;
    const videoUrlRegex = /(?:youtube\.com\/(?:watch\?v=|embed\/|v\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/;

    // Prioritize Video ID/URL
    if (input.match(videoUrlRegex)) {
        videoId = input.match(videoUrlRegex)[1];
    } else if (input.match(/^[a-zA-Z0-9_-]{11}$/)) { // Direct Video ID
        videoId = input;
    }
    // Then Channel ID/URL
    else if (input.match(channelIdRegex)) {
        channelId = input.match(channelIdRegex)[1];
    } else if (input.match(/^[a-zA-Z0-9_-]{24}$/)) { // Direct Channel ID (usually starts with UC)
        channelId = input;
    } else if (customUrlRegex.test(input)) {
        // For custom URLs, search by handle
        try {
            const handle = input.match(customUrlRegex)[1];
            const searchResponse = await gapi.client.youtube.channels.list({
                'part': ['snippet'],
                'forHandle': handle
            });
            if (searchResponse.result.items.length > 0) {
                channelId = searchResponse.result.items[0].id;
                console.log(`Resolved custom URL to Channel ID: ${channelId}`);
            }
        } catch (error) {
            console.warn('Could not resolve custom URL to channel ID directly via forHandle:', error);
            // Fallback to search if direct resolution fails
        }
    } else if (legacyUserRegex.test(input)) {
         // For legacy user URLs, search by username
        try {
            const username = input.match(legacyUserRegex)[1];
            const searchResponse = await gapi.client.youtube.channels.list({
                'part': ['snippet'],
                'forUsername': username
            });
            if (searchResponse.result.items.length > 0) {
                channelId = searchResponse.result.items[0].id;
                console.log(`Resolved legacy user URL to Channel ID: ${channelId}`);
            }
        } catch (error) {
            console.warn('Could not resolve legacy user URL to channel ID directly via forUsername:', error);
        }
    }


    if (videoId) {
        await fetchVideoDetails(videoId);
    } else if (channelId) {
        await fetchChannelDetails(channelId);
    } else {
        // As a last resort, try searching for a channel if nothing else matches
        await searchAndFetchChannel(input);
    }
});


async function fetchChannelDetails(channelId) {
    try {
        const response = await gapi.client.youtube.channels.list({
            'part': ['snippet', 'statistics', 'brandingSettings'],
            'id': channelId
        });

        if (response.result.items.length > 0) {
            const channel = response.result.items[0];
            displayDataItem(youtubeDataList, 'चैनल का नाम', channel.snippet.title);
            displayDataItem(youtubeDataList, 'चैनल ID', channel.id);
            // YouTube channel URL format is consistent: https://www.youtube.com/channel/CHANNEL_ID
            displayDataItem(youtubeDataList, 'चैनल लिंक', `<a href="https://www.youtube.com/channel/${channel.id}" target="_blank">YouTube पर देखें</a>`);
            displayDataItem(youtubeDataList, 'सदस्य', parseInt(channel.statistics.subscriberCount).toLocaleString());
            displayDataItem(youtubeDataList, 'कुल वीडियो', parseInt(channel.statistics.videoCount).toLocaleString());
            displayDataItem(youtubeDataList, 'कुल दृश्य', parseInt(channel.statistics.viewCount).toLocaleString());
            displayDataItem(youtubeDataList, 'विवरण', channel.snippet.description || 'कोई विवरण नहीं');
            if (channel.brandingSettings && channel.brandingSettings.image && channel.brandingSettings.image.bannerExternalUrl) {
                displayThumbnailItem(youtubeDataList, 'चैनल बैनर', channel.brandingSettings.image.bannerExternalUrl);
            }
            if (channel.snippet.thumbnails && channel.snippet.thumbnails.high) {
                displayThumbnailItem(youtubeDataList, 'प्रोफ़ाइल चित्र', channel.snippet.thumbnails.high.url);
            }
        } else {
            displayDataItem(youtubeDataList, 'जानकारी', 'चैनल नहीं मिला।');
            showErrorMessage('इस ID/लिंक के लिए कोई चैनल नहीं मिला।');
        }
    } catch (error) {
        console.error('Error fetching YouTube channel details:', error);
        showErrorMessage('YouTube चैनल विवरण प्राप्त करने में त्रुटि हुई। कृपया अपनी API कुंजी या इनपुट जांचें।');
    }
}

async function fetchVideoDetails(videoId) {
    try {
        const response = await gapi.client.youtube.videos.list({
            'part': ['snippet', 'statistics', 'contentDetails'],
            'id': videoId
        });

        if (response.result.items.length > 0) {
            const video = response.result.items[0];
            displayDataItem(youtubeDataList, 'वीडियो शीर्षक', video.snippet.title);
            displayDataItem(youtubeDataList, 'वीडियो ID', video.id);
            displayDataItem(youtubeDataList, 'वीडियो लिंक', `<a href="https://www.youtube.com/watch?v=${video.id}" target="_blank">YouTube पर देखें</a>`);
            displayDataItem(youtubeDataList, 'चैनल का नाम', video.snippet.channelTitle);
            displayDataItem(youtubeDataList, 'चैनल ID', video.snippet.channelId);
            displayDataItem(youtubeDataList, 'दृश्य', parseInt(video.statistics.viewCount || 0).toLocaleString());
            displayDataItem(youtubeDataList, 'पसंद', parseInt(video.statistics.likeCount || 0).toLocaleString());
            displayDataItem(youtubeDataList, 'टिप्पणियाँ', parseInt(video.statistics.commentCount || 0).toLocaleString());
            displayDataItem(youtubeDataList, 'विवरण', video.snippet.description.substring(0, 300) + (video.snippet.description.length > 300 ? '...' : '') || 'कोई विवरण नहीं'); // Truncate description
            displayDataItem(youtubeDataList, 'प्रकाशन तिथि', new Date(video.snippet.publishedAt).toLocaleDateString('hi-IN'));
            if (video.snippet.thumbnails && video.snippet.thumbnails.high) {
                displayThumbnailItem(youtubeDataList, 'थंबनेल', video.snippet.thumbnails.high.url);
            }
            displayDataItem(youtubeDataList, 'अवधि', formatDuration(video.contentDetails.duration));

        } else {
            displayDataItem(youtubeDataList, 'जानकारी', 'वीडियो नहीं मिला।');
            showErrorMessage('इस ID/लिंक के लिए कोई वीडियो नहीं मिला।');
        }
    } catch (error) {
        console.error('Error fetching YouTube video details:', error);
        showErrorMessage('YouTube वीडियो विवरण प्राप्त करने में त्रुटि हुई। कृपया अपनी API कुंजी या इनपुट जांचें।');
    }
}

// Helper function to format ISO 8601 duration (e.g., PT1H30M5S) to human-readable format
function formatDuration(isoDuration) {
    if (!isoDuration) return 'N/A';
    const regex = /PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/;
    const matches = isoDuration.match(regex);
    if (!matches) return isoDuration;

    const hours = parseInt(matches[1] || 0);
    const minutes = parseInt(matches[2] || 0);
    const seconds = parseInt(matches[3] || 0);

    const parts = [];
    if (hours > 0) parts.push(`${hours} घंटे`);
    if (minutes > 0) parts.push(`${minutes} मिनट`);
    if (seconds > 0) parts.push(`${seconds} सेकंड`);

    return parts.length > 0 ? parts.join(' ') : '0 सेकंड';
}


async function searchAndFetchChannel(query) {
    try {
        // Search for channels first
        const searchResponse = await gapi.client.Youtube.list({
            'part': 'snippet',
            'q': query,
            'type': 'channel',
            'maxResults': 1
        });

        if (searchResponse.result.items.length > 0) {
            const channelId = searchResponse.result.items[0].id.channelId;
            displayDataItem(youtubeDataList, 'खोज परिणाम (चैनल)', `"${searchResponse.result.items[0].snippet.title}" के लिए सबसे अच्छा मैच`);
            await fetchChannelDetails(channelId); // Fetch full details for the found channel
        } else {
            // If no channel found, try searching for a video
            const videoSearchResponse = await gapi.client.Youtube.list({
                'part': 'snippet',
                'q': query,
                'type': 'video',
                'maxResults': 1
            });
            if (videoSearchResponse.result.items.length > 0) {
                const videoId = videoSearchResponse.result.items[0].id.videoId;
                displayDataItem(youtubeDataList, 'खोज परिणाम (वीडियो)', `"${videoSearchResponse.result.items[0].snippet.title}" के लिए सबसे अच्छा मैच`);
                await fetchVideoDetails(videoId); // Fetch full details for the found video
            } else {
                displayDataItem(youtubeDataList, 'जानकारी', 'कोई YouTube चैनल या वीडियो नहीं मिला। कृपया सटीक लिंक या ID दर्ज करें।');
                showErrorMessage('कोई YouTube चैनल या वीडियो नहीं मिला।');
            }
        }
    } catch (error) {
        console.error('Error searching YouTube:', error);
        showErrorMessage('YouTube खोजने में त्रुटि हुई।');
    }
}

</script>
</body>
    </html>
